name: Build and check

on: [push]

env:
  FPBENCH: ~/fpbench

jobs:
  # Verify the project builds and installs cleanly under each supported
  # Python version, via both install paths.  ``uv`` is our primary
  # workflow; the ``pip`` variant keeps the legacy ``pip install -e .[dev]``
  # entry point from regressing.
  build-uv:
    name: "Build (uv)"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Build package
        run: uv build
      - name: Install fpy2
        run: uv sync

  build-pip:
    name: "Build (pip)"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install --upgrade pip build
      - name: Build package
        run: python -m build
      - name: Install fpy2
        run: pip install -e .[dev]

  mypy:
    name: "Mypy analyzer"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Install
        run: uv sync
      - name: Check
        run: uv run mypy fpy2

  ruff:
    name: "Ruff linter"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Install
        run: uv sync
      - name: Lint
        run: uv run ruff check fpy2/

  unit:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Checkout fpbench/fpbench"
        uses: actions/checkout@v4
        with:
          repository: fpbench/fpbench
          path: ~/fpbench
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Install
        run: uv sync
      - name: Unit Tests
        run: uv run make unittest
      - name: Infrastucture Tests
        run: uv run python -m tests.infra

  fpcore:
    name: "FPCore tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Checkout fpbench/fpbench"
        uses: actions/checkout@v4
        with:
          repository: fpbench/fpbench
          path: ~/fpbench
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Install
        run: uv sync
      - name: Compilation tests
        run: uv run python -m tests.infra.fpcore

  cpp:
    name: "C++ tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Checkout fpbench/fpbench"
        uses: actions/checkout@v4
        with:
          repository: fpbench/fpbench
          path: ~/fpbench
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Install
        run: uv sync
      - name: Tests (C++)
        # `run` mode is a superset of `compile`: it compiles every corpus
        # function and additionally executes the bit-exact-eligible subset,
        # checking each output against the FPy interpreter.
        run: uv run python -m tests.infra.backend.cpp --mode run

  sweep:
    name: "Sweep"
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: "Checkout fpbench/fpbench"
        uses: actions/checkout@v4
        with:
          repository: fpbench/fpbench
          path: ~/fpbench
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Install
        run: uv sync
      - name: Sweep (fused_dp)
        run: uv run python -m exploration.fused_dp.sweep --threads 2 1_000
